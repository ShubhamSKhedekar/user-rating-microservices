
server:
  port: 8081

spring:
  application:
    name: hotel-service
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/hotelservice_db
    username: hotel_service
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true