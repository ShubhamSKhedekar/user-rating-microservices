spring:
  application:
    # name: rating-service
    name: RATING-SERVICE

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/ratingservice_db
    username: rating_service
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

    fetch-registry: true
    register-with-eureka: true