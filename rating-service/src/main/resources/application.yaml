server:
  port: 8082

spring:
  application:
    name: rating-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/ratingservice_db
      database: ratingservice_db

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

    fetch-registry: true
    register-with-eureka: true